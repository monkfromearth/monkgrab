<!doctype html><html><head><meta charset="utf-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1400px;height:560px;overflow:hidden;font-family:Inter,system-ui,sans-serif}
  body{
    background:
      radial-gradient(900px 600px at 95% -10%, rgba(20,184,166,.12), transparent 55%),
      radial-gradient(800px 600px at -5% 110%, rgba(194,97,63,.13), transparent 50%),
      #f4ede2;
    color:#2b2520; display:flex; align-items:center; padding:0 90px; gap:60px;
  }
  .left{flex:1}
  .brand{display:flex;align-items:center;gap:18px;margin-bottom:26px}
  .brand img{width:72px;height:72px;border-radius:18px;box-shadow:0 10px 26px rgba(43,37,32,.18)}
  .brand .name{font-weight:800;font-size:40px;letter-spacing:-.02em}
  h1{font-size:60px;line-height:1.04;letter-spacing:-.03em;font-weight:800;max-width:760px}
  h1 .hl{color:#0f8c80}
  .sub{margin-top:22px;font-size:23px;color:#6b6258;max-width:640px;line-height:1.4}
  .sub b{color:#2b2520}
  .chips{display:flex;gap:12px;margin-top:30px}
  .chip{font-size:16px;font-weight:600;background:#fbf7f0;border:1px solid #ddd0bd;border-radius:11px;padding:10px 17px;display:flex;align-items:center;gap:8px}
  .chip .dot{width:9px;height:9px;border-radius:50%;background:#14b8a6}

  .right{width:420px;display:flex;align-items:center;gap:20px}
  .card{background:#fbf7f0;border:1px solid #ddd0bd;border-radius:16px;box-shadow:0 22px 50px rgba(43,37,32,.16);overflow:hidden;flex:1}
  .winbar{background:#ece2d3;padding:11px 14px;display:flex;gap:7px;border-bottom:1px solid #ddd0bd}
  .winbar i{width:10px;height:10px;border-radius:50%;display:block}
  .winbody{padding:18px}
  .winbody .l{height:9px;border-radius:4px;background:#e6dac8;margin-bottom:10px}
  .iframe{border:2px dashed #C2613F;border-radius:9px;padding:12px;margin-top:6px;background:rgba(194,97,63,.06)}
  .iframe .tagx{font-size:10px;font-weight:700;color:#C2613F;margin-bottom:9px;font-family:'JetBrains Mono',monospace}
  .iframe .l{background:#e7d2c2}
  .arrow{font-size:40px;font-weight:800;color:#0f8c80}
  .mdbar{background:#2b2520;color:#f4ede2;padding:10px 13px;font-size:10px;font-family:'JetBrains Mono',monospace}
  .mdbody{padding:15px;font-size:11px;line-height:1.7;font-family:'JetBrains Mono',monospace;color:#3b342c}
  .mdbody .mh{color:#0f8c80}
</style></head>
<body>
  <div class="left">
    <div class="brand"><img src="icon128.png" alt=""><span class="name">MonkGrab</span></div>
    <h1>Webpage to <span class="hl">Markdown</span>,<br>in one click.</h1>
    <p class="sub">Grabs content even inside <b>cross-origin iframes</b> other tools miss. Fully local, no tracking.</p>
    <div class="chips">
      <span class="chip"><span class="dot"></span>One click / ⌘⇧G</span>
      <span class="chip"><span class="dot"></span>100% local</span>
      <span class="chip"><span class="dot"></span>Open source</span>
    </div>
  </div>
  <div class="right">
    <div class="card">
      <div class="winbar"><i style="background:#e06c5b"></i><i style="background:#e9b04e"></i><i style="background:#5bbf6a"></i></div>
      <div class="winbody">
        <div class="l" style="width:92%"></div>
        <div class="l" style="width:74%"></div>
        <div class="iframe"><div class="tagx">◇ IFRAME</div><div class="l" style="width:86%"></div><div class="l" style="width:60%;margin-bottom:0"></div></div>
      </div>
    </div>
    <div class="arrow">→</div>
    <div class="card">
      <div class="mdbar">page.md</div>
      <div class="mdbody"><span class="mh"># Title</span><br>clean text,<br>**bold**, links<br><span class="mh">## iframe</span><br>captured too</div>
    </div>
  </div>
</body></html>
